name: Security Analysis (zizmor)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read # Required to read the code for analysis

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-analysis:
    name: Run Zizmor Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to create security events from the analysis results
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Run zizmor security analysis
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          inputs: .github/workflows/*.yml # Don't specify just the folder. Otherwise, it won't load the preview in the results
          token: ${{ secrets.GITHUB_TOKEN }}
          min-severity: low
          min-confidence: low
          persona: auditor