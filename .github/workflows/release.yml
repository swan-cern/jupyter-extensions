name: Release

on:
  workflow_dispatch:
    inputs:
      extension:
        description: "Extension name"
        required: true
        type: choice
        options:
          - HdfsBrowser
          - SparkConnector
          - SwanContents
          - SwanCustomEnvironments
          - SwanDask
          - SwanHeader
          - SwanHelp
          - SwanIntro
          - SwanKernelEnv
          - SwanMarimoProxy
          - SwanMetrics
          - SwanNotifications
          - SwanOauthRenew
          - SwanPortAllocator
          - SwanShare
      bump:
        description: "Version bump"
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: '3.12' # nbclassic (required by swancontents) needs the `pipes` module removed in 3.13

      - name: Install node
        if: hashFiles(format('{0}/package.json', inputs.extension)) != ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'

      - name: Bump version
        id: version
        run: |
          # Run bump2version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd ${{ inputs.extension }}
          uvx bump2version ${{ inputs.bump }}

          # Get the new tag and version
          TAG=$(git describe --tags --exact-match)
          VERSION=$(echo "$TAG" | cut -d / -f 2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          # Get the previous tag for this extension
          PREV_TAG=$(git describe --tags --match "${{ inputs.extension }}/*" --abbrev=0 HEAD~1 2>/dev/null || true)
          # If there is a previous tag, get commits since that tag, otherwise get all commits
          [ -n "$PREV_TAG" ] && RANGE="$PREV_TAG..HEAD" || RANGE="HEAD"
          # Format commit messages as a markdown list & remove the extension name from the beginning of the message
          EXT_LOWER=$(echo "${{ inputs.extension }}" | tr '[:upper:]' '[:lower:]')
          git log "$RANGE" --pretty=format:"- %B" -- "${{ inputs.extension }}" \
            | sed -r "s/$EXT_LOWER: //g" > /tmp/release_body.md

      - name: Push version bump commit and tag
        env:
          WORKFLOW_ACCESS_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
        run: |
          # Bypass branch protection rules by using the workflow access token
          git remote set-url origin "https://x-access-token:${WORKFLOW_ACCESS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin master --tags --atomic

      - name: Build wheel 📦
        run: |
          cd ${{ inputs.extension }}
          uv build

      - name: Publish to PyPI 🚀
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: ./${{ inputs.extension }}/dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release_body.md

      - name: Trigger package update in jupyter-images
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
        run: |
          gh workflow run update-packages.yml \
            --repo swan-cern/jupyter-images \
            --ref master \
            -f package="${{ inputs.extension }}" \
            -f version="${{ steps.version.outputs.version }}"
